version: "3"

vars:
  GO_BINARY: ./build/mygosh
  GO_MAIN: ./bin
  DOCKER_SERVICE: server
  BUF_VERSION: v1.70.0
  LOCAL_TOOLS_BIN: ./build/tools/bin
  LOCAL_BUF: ./build/tools/bin/buf

tasks:
  ensure:buf:
    internal: true
    desc: Install buf locally when it is not already available on PATH
    cmds:
      - |
        if command -v buf >/dev/null 2>&1 || [ -x {{.LOCAL_BUF}} ]; then
          exit 0
        fi
        mkdir -p {{.LOCAL_TOOLS_BIN}}
        GOBIN="$(pwd)/build/tools/bin" go install github.com/bufbuild/buf/cmd/buf@{{.BUF_VERSION}}

  build:
    desc: Generate protobuf code with buf and build the mygosh binary
    cmds:
      - task: ensure:buf
      - mkdir -p ./build
      - |
        if command -v buf >/dev/null 2>&1; then
          buf generate
        else
          {{.LOCAL_BUF}} generate
        fi
      - go build -o {{.GO_BINARY}} {{.GO_MAIN}}

  dev:
    desc: Run the local development verification flow
    cmds:
      - task: build
      - golangci-lint run

  docker:server:
    desc: Build and run the mygosh server in Docker Compose
    cmds:
      - docker compose up --watch --build --remove-orphans {{.DOCKER_SERVICE}}
