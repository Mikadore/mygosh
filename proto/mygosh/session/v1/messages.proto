syntax = "proto3";

package mygosh.session.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/Mikadore/mygosh/lib/session/sessionpb;sessionpb";

message Envelope {
  oneof kind {
    option (buf.validate.oneof).required = true;

    OpenRequest open = 1;
    OpenResponse open_ok = 2;
    Data data = 3;
    Error err = 4;
    Resize resize = 5;
    Close close = 6;
    ExitStatus exit_status = 7;
  }
}

message OpenRequest {
  string term = 1;
  uint32 rows = 2 [(buf.validate.field).uint32.lte = 65535];
  uint32 cols = 3 [(buf.validate.field).uint32.lte = 65535];
}

message OpenResponse {
  string session_id = 1;
}

message Data {
  bytes data = 1;
}

message Error {
  string code = 1;
  string message = 2 [(buf.validate.field).string.min_len = 1];
}

message Resize {
  uint32 rows = 1 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  uint32 cols = 2 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
}

message Close {
  string reason = 1;
}

message ExitStatus {
  int32 code = 1;
}
