syntax = "proto3";

package service;

import "buf/validate/validate.proto";

option go_package = "github.com/Mikadore/mygosh/lib/service/servicepb;servicepb";

message PtyRequest {
  string term = 1;
  uint32 rows = 2 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  uint32 cols = 3 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
}

message ExecRequest {
  string command = 1 [(buf.validate.field).string.min_len = 1];
}

message TerminalSize {
  uint32 rows = 1 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
  uint32 cols = 2 [(buf.validate.field).uint32 = {
    gt: 0
    lte: 65535
  }];
}

message ExitStatus {
  int32 code = 1;
}
